apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  namespace: test-ns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      nodeSelector:
        name: gudboi
      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80 