apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy
  namespace: test-ns
  labels:
    app: nginx-l
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx-l
  template:
    metadata:
      labels:
        app: nginx-l
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: name
                operator: In 
                values: ["gudboi"]
      containers:
      - name: nginx-container
        image: nginx
        ports:
        - containerPort: 80 